services:
  nyc-taxi-pipeline:
    build: .
    container_name: nyc-taxi-pipeline
    volumes:
      - ./data:/app/data
      - C:/Users/amerk/.aws:/root/.aws:ro
    environment:
      - AWS_PROFILE=zia-u-rahman.amerkhill
      - AWS_REGION=us-east-2
    command: python src/main.py
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:15
    container_name: taxi_postgres_db
    environment:
      POSTGRES_USER: taxi_user
      POSTGRES_PASSWORD: taxi_password
      POSTGRES_DB: taxi_db
    ports:
      - "5435:5432"
    volumes:
      - taxi_postgres_data:/var/lib/postgresql/data

volumes:
  taxi_postgres_data: